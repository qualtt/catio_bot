services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catio_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_password}
      POSTGRES_DB: ${POSTGRES_DB:-catio_bot_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catio_bot} -d ${POSTGRES_DB:-catio_bot_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    restart: always
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catio_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_password}
      POSTGRES_DB: ${POSTGRES_DB:-catio_bot_db}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-catio_bot}:${POSTGRES_PASSWORD:-bot_password}@db:5432/${POSTGRES_DB:-catio_bot_db}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
      DAILY_SLOT_TIMES: ${DAILY_SLOT_TIMES:-11:00}
      AUTO_POST_DAYS_AHEAD: ${AUTO_POST_DAYS_AHEAD:-30}
      PUBLISHER_POLL_INTERVAL_SECONDS: ${PUBLISHER_POLL_INTERVAL_SECONDS:-60}
      DUPLICATE_PHASH_MAX_DISTANCE: ${DUPLICATE_PHASH_MAX_DISTANCE:-8}
      SCORE_APPROVED_POST_BASE: ${SCORE_APPROVED_POST_BASE:-100}
      SCORE_AUTO_BONUS_MIN_PERCENT: ${SCORE_AUTO_BONUS_MIN_PERCENT:-10}
      SCORE_AUTO_BONUS_MAX_PERCENT: ${SCORE_AUTO_BONUS_MAX_PERCENT:-20}
      SCORE_PENDING_POST_WEIGHT_PERCENT: ${SCORE_PENDING_POST_WEIGHT_PERCENT:-50}
      SCORE_DUPLICATE_EXACT_FACTOR_PERCENT: ${SCORE_DUPLICATE_EXACT_FACTOR_PERCENT:-0}
      SCORE_DUPLICATE_SIMILAR_FACTOR_PERCENT: ${SCORE_DUPLICATE_SIMILAR_FACTOR_PERCENT:-50}
      SCORE_OLD_PHOTO_CORRECT: ${SCORE_OLD_PHOTO_CORRECT:-3}
      SCORE_OLD_PHOTO_DAILY_CAP: ${SCORE_OLD_PHOTO_DAILY_CAP:-30}
      IDENTIFICATION_VOTES_REQUIRED: ${IDENTIFICATION_VOTES_REQUIRED:-3}
      IDENTIFICATION_CONSENSUS_PERCENT: ${IDENTIFICATION_CONSENSUS_PERCENT:-67}
      IDENTIFICATION_MAX_VOTES_PER_PHOTO: ${IDENTIFICATION_MAX_VOTES_PER_PHOTO:-7}
      IDENTIFICATION_ASSIGNMENT_TTL_MINUTES: ${IDENTIFICATION_ASSIGNMENT_TTL_MINUTES:-30}
      IDENTIFICATION_BATCH_SIZE: ${IDENTIFICATION_BATCH_SIZE:-10}
      IDENTIFICATION_MAX_ACTIVE_ASSIGNMENTS_PER_PHOTO: ${IDENTIFICATION_MAX_ACTIVE_ASSIGNMENTS_PER_PHOTO:-3}
      BOT_CONTENT_PATH: ${BOT_CONTENT_PATH:-/app/bot_content.json}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PREFIX: ${S3_PREFIX:-catio-bot/photos}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      API_ID: ${API_ID:-}
      API_HASH: ${API_HASH:-}
      USERBOT_SESSION_STRING: ${USERBOT_SESSION_STRING:-}
      USERBOT_SESSION_NAME: ${USERBOT_SESSION_NAME:-catio_importer}
    volumes:
      - ./bot_content.json:/app/bot_content.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
