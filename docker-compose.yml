version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-animal_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_password}
      POSTGRES_DB: ${POSTGRES_DB:-animal_bot_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # The bot and userbot will be run locally for development first
  # bot:
  #   build: .
  #   restart: always
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db
  #     - redis

volumes:
  pgdata:
  redisdata:
